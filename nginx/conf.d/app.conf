# Ограничение частоты запросов: 5 запросов в секунду с одного IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

# Ограничение одновременных соединений с одного IP (10)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Скрыть версию Nginx
server_tokens off;

# HTTP -> HTTPS редирект
server {
    listen 80 default_server;
    server_name _;

    # Редирект с сохранением URI
    return 301 https://$host$request_uri;
}

# Основной HTTPS-сервер
server {
    listen 443 ssl default_server;
    server_name _;

    # SSL-сертификаты (пути соответствуют монтированию в docker-compose)
    ssl_certificate     /etc/nginx/ssl/localhost+2.pem;
    ssl_certificate_key /etc/nginx/ssl/localhost+2-key.pem;

    # Современные параметры SSL (минимальный набор)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Логирование (настраивается по желанию)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Дополнительные заголовки безопасности (Helmet дублирует, но не помешает)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ----- Статические файлы (отдаются напрямую Nginx) -----
    # Предполагается, что в docker-compose вы смонтировали public в Nginx:
    #   volumes:
    #     - ./public:/usr/share/nginx/html/static
    # Либо используем прокси на Node, но тогда статика не кешируется Nginx.
    # Здесь предлагаю проксировать, но с отдельными лимитами и кешем.
    location /css/ {
        proxy_pass http://node_app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Для статики отключаем rate limiting (или ставим более мягкий)
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;
        # Кеширование ответа на стороне Nginx (30 дней)
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        proxy_pass http://node_app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Картинки и favicon
    location /images/ {
        proxy_pass http://node_app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api_limit burst=30 nodelay;
        limit_conn conn_limit 30;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        proxy_pass http://node_app:3000;
        proxy_set_header Host $host;
        limit_req zone=api_limit burst=5;
        limit_conn conn_limit 5;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ----- Основное приложение (динамические запросы) -----
    location / {
        # Лимиты для динамических запросов
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://node_app:3000;

        # Проброс реальных IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для долгих операций (например, экспорт данных)
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Отключаем буферизацию для потоковых ответов (если будут)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ----- Страницы ошибок (если упал node_app) -----
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
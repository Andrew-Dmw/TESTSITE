limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP-блок: только редирект на HTTPS
server {
    listen 80 default_server;
    server_name _;
    
    # Редирект на тот же URI, но с протоколом HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS-блок: основная логика (лимиты, прокси)
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/localhost+2.pem;
    ssl_certificate_key /etc/nginx/ssl/localhost+2-key.pem;

    # Остальные настройки (limit_req, proxy_pass и т.д.)
    location / {
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn conn_limit 10;
        proxy_pass http://node_app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
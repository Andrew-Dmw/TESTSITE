name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: my_diploma_test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4   # v5 не существует

      - uses: actions/setup-node@v4 # v6 не существует
        with:
          node-version: 20

      - name: Install MySQL client
        run: sudo apt-get install -y mysql-client

      - name: Init DB
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS my_diploma_test_db;"
          mysql -h 127.0.0.1 -u root -proot my_diploma_test_db < db/init.sql
          mysql -h 127.0.0.1 -u root -proot my_diploma_test_db -e "SHOW TABLES;"

      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_DATABASE: my_diploma_test_db
          RATE_LIMIT_MAX: 5
          PASSWORD_PEPPER: test_pepper_change_me
          SESSION_SECRET: test_session_secret            # ← добавьте это
  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build and start containers
        run: |
          cp .env.example .env
          docker compose up -d --build
      - name: Wait for healthy
        run: |
          for i in {1..30}; do
            if curl -k -s -o /dev/null -w "%{http_code}" https://localhost | grep -q 200; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          echo "Failed to start" && exit 1
      - name: Show logs on failure
        if: failure()
        run: docker compose logs